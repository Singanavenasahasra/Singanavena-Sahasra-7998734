<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 12: Margin and Padding Spacing Utilities</title>
    <link rel="stylesheet" href="CSS/bootstrap.min.css">
</head>
<body class="bg-light">

    <div class="container my-5">
        <h3 class="text-center fw-bold text-dark mb-4">Exercise 12.2: Balanced Service Matrix</h3>
        
        <div class="row justify-content-center">
            <div class="col-md-5">
                <!-- Spacing block using high padding scales (p-4, py-5) and external drop shadows -->
                <div class="card p-4 py-5 shadow-lg rounded border-0 text-center bg-white">
                    <span class="badge bg-success-subtle text-success-emphasis rounded-pill px-3 py-2 fw-bold align-self-center mb-3">Enterprise Dev Option</span>
                    <h1 class="display-4 fw-bold text-dark">$49<span class="fs-6 text-muted font-weight-normal">/mo</span></h1>
                    
                    <!-- Margin utilities (mt-4, mb-4) dividing content lines cleanly -->
                    <p class="text-muted small mt-4 mb-4 px-3">
                        Includes production database instances, 100% telemetry storage streams, multi-catch security pipelines, and complete offline capability frameworks.
                    </p>
                    
                    <button class="btn btn-success w-100 py-2 fw-bold rounded-pill shadow-sm">Initialize Enterprise Cluster</button>
                </div>
            </div>
        </div>
    </div>

    <script src="CSS/js/bootstrap.bundle.min.js"></script>
</body>
</html>
