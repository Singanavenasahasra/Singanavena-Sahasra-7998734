<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 14: Display and Visibility</title>
    <link rel="stylesheet" href="CSS/bootstrap.min.css">
</head>
<body class="bg-light">

    <div class="container my-5">
        <h3 class="mb-4 text-center fw-bold text-muted">Exercise 14: Screen Breakpoint Visibility</h3>
        
        <div class="row g-3">
            <!-- 14.2 Sidebar using d-none d-md-block (Hides on Mobile / Appears on Tablet and Above) -->
            <aside class="col-md-3 d-none d-md-block">
                <div class="alert alert-dark fw-bold m-0 text-center py-4">
                    📁 Tablet+ Sidebar Panel (d-none d-md-block)
                </div>
            </aside>

            <!-- Main Content Area taking full width on mobile, resizing to col-9 on desktop -->
            <main class="col-md-9">
                <div class="card p-4 shadow-sm border bg-white">
                    <h5 class="fw-bold">Active Workspace Log</h5>
                    <p class="text-muted m-0">
                        If you resize your browser window below 768px (Mobile viewport sizing), the navigation sidebar layout on the left will collapse out of sight to maximize workspace readability!
                    </p>
                </div>
            </main>
        </div>
    </div>

    <script src="CSS/js/bootstrap.bundle.min.js"></script>
</body>
</html>
