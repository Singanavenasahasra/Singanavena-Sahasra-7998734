<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 5: Alignment and Reordering</title>
    <link class="stylesheet" href="CSS/bootstrap.min.css">
</head>
<body class="bg-light">

    <div class="container my-5">
        <!-- 5.1: Center elements inside row box -->
        <h4 class="text-muted fw-bold mb-3">Exercise 5.1: Centered Row Alignment</h4>
        <div class="row justify-content-center align-items-center bg-white border rounded shadow-sm py-5 mb-5" style="min-height: 200px;">
            <div class="col-4 text-center">
                <div class="p-3 bg-danger text-white rounded fw-bold">Perfectly Centered Content Panel</div>
            </div>
        </div>

        <!-- 5.2: Column Order Reordering across screens -->
        <h4 class="text-muted fw-bold mb-3">Exercise 5.2: Column Target Reordering</h4>
        <div class="row text-center text-white fw-bold shadow-sm rounded overflow-hidden">
            <div class="col-md-6 bg-primary p-4 order-md-2 order-1">
                Panel Alpha (Top position on Mobile / Swaps to Right Side on Desktop)
            </div>
            <div class="col-md-6 bg-dark p-4 order-md-1 order-2">
                Panel Beta (Bottom position on Mobile / Swaps to Left Side on Desktop)
            </div>
        </div>
    </div>

    <script src="CSS/js/bootstrap.bundle.min.js"></script>
</body>
</html>
