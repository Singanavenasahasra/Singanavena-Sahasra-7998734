<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 9: Buttons and Button Groups</title>
    <link rel="stylesheet" href="CSS/bootstrap.min.css">
</head>
<body class="bg-light">

    <div class="container my-5 p-4 bg-white border rounded shadow-sm" style="max-width: 600px;">
        <!-- 9.1 Contextual Color Classes -->
        <h4 class="fw-bold mb-3 text-secondary">Exercise 9.1: Contextual Classes Matrix</h4>
        <div class="d-flex flex-wrap gap-2 mb-5">
            <button class="btn btn-primary">Primary Action</button>
            <button class="btn btn-secondary">Secondary Link</button>
            <button class="btn btn-success">Success Confirm</button>
            <button class="btn btn-danger">Danger Alert</button>
            <button class="btn btn-outline-dark">Outline Border Variant</button>
        </div>

        <!-- 9.2 Checkbox Toggle Clusters -->
        <h4 class="fw-bold mb-3 text-secondary">Exercise 9.2: Checkbox Button Toggle Group</h4>
        <div class="btn-group w-100" role="group" aria-label="Toggle metric options">
            <input type="checkbox" class="btn-check" id="btnGroupTrack1" autocomplete="off" checked>
            <label class="btn btn-outline-primary fw-bold" for="btnGroupTrack1">Data Logging Stream</label>

            <input type="checkbox" class="btn-check" id="btnGroupTrack2" autocomplete="off">
            <label class="btn btn-outline-success fw-bold" for="btnGroupTrack2">Console Echo Loop</label>
        </div>
    </div>

    <script src="CSS/js/bootstrap.bundle.min.js"></script>
</body>
</html>
