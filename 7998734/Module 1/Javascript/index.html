<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Event Portal</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

    <header>
        <h1>Local Community Event Portal</h1>
        <button id="registerBtn" class="btn">Go to Registration Form</button>
    </header>

    <main>
        <div id="loadingSpinner" style="display: none; text-align: center; font-weight: bold; padding: 10px; color: #3498db;">
            Loading server processes...
        </div>

        <section id="controls-section">
            <h2>Filter & Search Portal</h2>
            <select id="categoryFilter">
                <option value="">All Categories</option>
                <option value="Music">Music</option>
                <option value="Workshop">Workshop</option>
                <option value="Social">Social</option>
            </select>

            <input type="text" id="searchBox" placeholder="Quick search events by name...">
        </section>

        <section>
            <h2>Available Upcoming Events</h2>
            <div id="eventContainer"></div>
        </section>

        <section>
            <h2>Official Registration Hub</h2>
            <form id="registrationForm">
                <div class="form-group">
                    <label>Full Name:</label>
                    <input type="text" name="userName">
                </div>
                <div class="form-group">
                    <label>Email Address:</label>
                    <input type="text" name="userEmail">
                </div>
                <div class="form-group">
                    <label>Select Target Event ID:</label>
                    <select name="selectedEventId">
                        <option value="">-- Choose ID --</option>
                        <option value="1">Event 1</option>
                        <option value="2">Event 2</option>
                        <option value="3">Event 3</option>
                        <option value="4">Event 4</option>
                    </select>
                </div>
                <button type="submit" class="btn">Submit Secure Application</button>
            </form>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
